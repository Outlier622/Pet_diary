name: CI (lint + tests + contract + image)

on:
  pull_request:
  push:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-ci:
    runs-on: ubuntu-latest

    env:
      BASE_URL: http://localhost:5000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: |
            requirements.txt

      - name: Install system deps (libGL for OpenCV, etc.)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 curl jq

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-cov schemathesis pip-audit

      # ---------- Lint ----------
      - name: Lint (ruff)
        run: ruff check .

      # ---------- Unit & Integration ----------
      - name: Unit & Integration tests
        env:
          CI: "1"
        run: |
          pytest -q tests/unit tests/integration

      - name: Coverage gate (>= 80%)
        run: |
          pytest -q --maxfail=1 --durations=10 \
            --cov=. --cov-report=xml --cov-report=term-missing --cov-fail-under=80

      # ---------- Build Docker image ----------
      - name: Build Docker image
        run: docker build -f infra/Dockerfile -t dog-cat-api-ci:${{ github.sha }} .

      # ---------- E2E / Contract ----------
      - name: Compose up (API service)
        run: |
          docker compose up -d
          for i in {1..30}; do
            if curl -fsS "${BASE_URL}/livez" >/dev/null 2>&1; then
              echo "service is up"; break
            fi
            sleep 1
          done

      - name: E2E smoke tests
        env:
          BASE_URL: ${{ env.BASE_URL }}
        run: |
          pytest -q -m "e2e" || pytest -q tests/e2e || true

      - name: OpenAPI contract tests (schemathesis)
        env:
          BASE_URL: ${{ env.BASE_URL }}
        run: |
          if [ -f openapi.yaml ]; then
            schemathesis run openapi.yaml --base-url="$BASE_URL" --checks all
          else
            echo "openapi.yaml not found, skip contract tests"
          fi

      # ---------- Security ----------
      - name: Dependency security scan (pip-audit)
        run: pip-audit

      # ---------- Collect artifacts on failure ----------
      - name: Dump docker logs (on failure)
        if: failure()
        run: docker compose logs --no-color > docker-logs.txt

      - name: Upload artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-artifacts
          path: |
            coverage.xml
            docker-logs.txt

      # ---------- Teardown ----------
      - name: Compose down
        if: always()
        run: docker compose down -v

      - name: Spin up for metrics check
        run: |
          docker compose -f docker-compose.monitor.yml up -d
          curl -fsS http://localhost:5000/metrics | head -n 5


      - name: Validate Prometheus rules
        uses: docker://prom/prometheus
        with:
          args: --config.file=/etc/prometheus/prometheus.yml

name: CI (lint + test)

on:
  pull_request:
  push:
    branches: [ main, develop ]

jobs:
  python-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cat_dog_app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: |
            cat_dog_app/requirements.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest

      - name: Lint (ruff)
        run: ruff check .

      - name: Tests (pytest)
        env:
          CI: "1"
        run: pytest -q

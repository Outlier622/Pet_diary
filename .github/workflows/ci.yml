name: CI (lint + test)

on:
  pull_request:
  push:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
      - name: Install system deps (libGL for OpenCV, etc.)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest
      - name: Lint (ruff)
        run: ruff check .
      - name: Tests (pytest)
        env:
          CI: "1"
        run: pytest -q
      - name: Build Docker image
        run: docker build -f infra/Dockerfile -t dog-cat-api-ci:${{ github.sha }} .

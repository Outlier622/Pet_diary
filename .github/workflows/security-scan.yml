name: security-scan
on: [push, pull_request]
jobs:
  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          severity: HIGH,CRITICAL
          exit-code: '1'
      - run: docker build -t app:ci .
      - uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: app:ci
          severity: HIGH,CRITICAL
          exit-code: '1'

version: "3.9"

services:
  api:
    image: dog-cat-api:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: infra/Dockerfile
    container_name: dog-cat-api
    environment:
      FLASK_ENV: production
      PORT: "${PORT:-8000}"
      MODEL_PATH: /app/cat_dog_app/models
      DB_PATH: /app/data/results.sqlite
      APP_TOKEN: "${APP_TOKEN:-dev-token}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-http://localhost:3000}"
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:${PORT}/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    volumes:
      - ./data:/app/data
      - ./cat_dog_app/models:/app/cat_dog_app/models
    restart: unless-stopped
    command: >
      sh -c "python -u cat_dog_app/app.py"

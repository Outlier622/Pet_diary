services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: diary
      POSTGRES_PASSWORD: diary
      POSTGRES_DB: diary
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    #ports:
    #  - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    #ports:
    #  - "9000:9000"
    #  - "9001:9001"
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata:

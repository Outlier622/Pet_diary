[pytest]
testpaths = tests
addopts = -q -ra --disable-warnings --maxfail=1 --durations=10 \
          --cov=. --cov-report=term-missing --cov-fail-under=80

markers =
    slow: mark test as slow
    e2e: end-to-end tests
    contract: openapi contract tests

filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning

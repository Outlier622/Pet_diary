groups:
- name: dogcat.rules
  rules:
  - alert: HighErrorRate
    expr: |
      sum(rate(http_requests_total{code=~"5.."}[5m]))
      /
      sum(rate(http_requests_total[5m])) > 0.02
    for: 5m
    labels: {severity: page}
    annotations:
      summary: "5xx error rate > 2% (5m)"

  - alert: HighP95Latency
    expr: |
      histogram_quantile(0.95, sum(rate(http_request_seconds_bucket[5m])) by (le))
      > 1.5
    for: 10m
    labels: {severity: ticket}
    annotations:
      summary: "p95 latency > 1.5s (10m)"

  - alert: ReadinessFailing
    expr: |
      (1 - model_loaded) > 0
    for: 2m
    labels: {severity: ticket}
    annotations:
      summary: "Model not ready"
